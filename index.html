<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenithWave Verification</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
  overflow: hidden;
}

/* Glow background */
body::before {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: #22c55e;
  filter: blur(120px);
  opacity: 0.3;
}

/* Card */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  width: 320px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

h1 {
  font-size: 22px;
  margin-bottom: 10px;
  color: #fff;
}

p {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 25px;
}

/* Button */
button {
  padding: 14px 25px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #4ade80);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #22c55e;
}

/* Loader */
.loader {
  display: none;
  margin-top: 20px;
}

.loader div {
  width: 10px;
  height: 10px;
  background: #22c55e;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1s infinite alternate;
}

.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  to { transform: translateY(-10px); }
}

/* Success */
.success {
  display: none;
  margin-top: 20px;
  color: #4ade80;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <h1>🔐 ZenithWave Verify</h1>
  <p>Secure your account to continue</p>

  <button onclick="verify()">Verify Now</button>

  <div class="loader" id="loader">
    <div></div><div></div><div></div>
  </div>

  <div class="success" id="success">
    ✅ Verified Successfully!
  </div>
</div>

<script>
const url = new URL(window.location.href);
const user = url.searchParams.get("user");

async function verify(){

  document.querySelector("button").style.display = "none";
  document.getElementById("loader").style.display = "block";

  let device = btoa(navigator.userAgent + screen.width + screen.height);

  try {

    // 🔥 Wake server
    await fetch("https://zenithwave-refer-1.onrender.com");

    // wait a bit (IMPORTANT)
    await new Promise(r => setTimeout(r, 2000));

    let res = await fetch("https://zenithwave-refer-1.onrender.com/verify",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        user:user,
        device:device
      })
    });

    let data = await res.json();

    if(data.status === "success"){
      document.getElementById("loader").style.display = "none";
      document.getElementById("success").style.display = "block";

      setTimeout(()=>{
        window.location.href = "https://t.me/ZenithWave_Refer_Bot";
      },2000);

    } else {
      alert("❌ " + data.msg);
      location.reload();
    }

  } catch(e){
    alert("⚠️ Server starting... click again in 3 seconds");
    console.log(e);
  }
}
